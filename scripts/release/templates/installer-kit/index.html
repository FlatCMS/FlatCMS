<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>FlatCMS - Loading installer system</title>
    <style>
        :root {
            --bg-1: #0b1220;
            --bg-2: #17233a;
            --surface: rgba(15, 23, 42, 0.74);
            --surface-border: rgba(148, 163, 184, 0.22);
            --text-main: #f8fafc;
            --text-soft: #94a3b8;
            --brand-1: #6366f1;
            --brand-2: #8b5cf6;
            --brand-3: #22d3ee;
            --ok: #22c55e;
            --error: #ef4444;
            --shadow: 0 28px 72px rgba(2, 6, 23, 0.48);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(980px 620px at 8% 5%, rgba(99, 102, 241, 0.28), transparent 58%),
                radial-gradient(820px 500px at 94% 88%, rgba(139, 92, 246, 0.26), transparent 56%),
                linear-gradient(150deg, var(--bg-1), var(--bg-2));
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .launcher {
            width: min(980px, 100%);
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .launcher-head {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 22px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(15, 23, 42, 0.42);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #c7d2fe;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(145deg, var(--brand-3), var(--brand-1));
            box-shadow: 0 0 14px rgba(99, 102, 241, 0.8);
        }

        .launcher-main {
            padding: 26px 24px 26px;
        }

        .title {
            margin: 0;
            font-size: clamp(28px, 4vw, 40px);
            line-height: 1.12;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .subtitle {
            margin: 10px auto 0;
            max-width: 760px;
            color: var(--text-soft);
            font-size: 15px;
            line-height: 1.55;
            text-align: center;
        }

        .scene {
            position: relative;
            height: 290px;
            --folder-size-w: 36px;
            --folder-size-h: 26px;
            --start-x: 82px;
            --start-y: 132px;
            --end-x: 732px;
            --end-y: 132px;
            --arc-y: 38px;
            margin: 22px auto 16px;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.55), rgba(15, 23, 42, 0.2)),
                repeating-linear-gradient(
                    90deg,
                    rgba(148, 163, 184, 0.06) 0 1px,
                    transparent 1px 92px
                );
            overflow: hidden;
        }

        .scene::before,
        .scene::after {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            filter: blur(56px);
            pointer-events: none;
            opacity: 0.54;
        }

        .scene::before {
            left: 34px;
            top: 30px;
            background: rgba(99, 102, 241, 0.56);
        }

        .scene::after {
            right: 34px;
            top: 34px;
            background: rgba(34, 211, 238, 0.36);
        }

        .node {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 132px;
            text-align: center;
            z-index: 3;
        }

        .node.gift {
            left: 34px;
        }

        .node.server {
            right: 34px;
        }

        .node-label {
            margin-top: 10px;
            font-size: 12px;
            color: #cbd5e1;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .node-icon {
            width: 92px;
            height: 92px;
            margin: 0 auto;
            display: block;
            filter: drop-shadow(0 20px 24px rgba(15, 23, 42, 0.5));
        }

        .folder-lane {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 4;
        }

        .flying-folder {
            position: absolute;
            left: 0;
            top: 0;
            width: 34px;
            height: 30px;
            opacity: 0;
            transform-origin: center center;
            will-change: left, top, transform, opacity;
            filter: drop-shadow(0 8px 14px rgba(15, 23, 42, 0.4));
        }

        .flying-folder svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .progress-wrap {
            margin-top: 14px;
        }

        .progress-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .progress-status {
            color: #dbeafe;
            font-weight: 600;
        }

        .progress-percent {
            color: #c7d2fe;
            font-weight: 700;
        }

        .progress-track {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.2);
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--brand-3), var(--brand-1), var(--brand-2));
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
            transition: width 180ms ease-out;
        }

        .message {
            margin-top: 12px;
            text-align: center;
            min-height: 22px;
            font-size: 13px;
            color: var(--text-soft);
        }

        .message.error {
            color: #fecaca;
        }

        .message.success {
            color: #bbf7d0;
        }

        .actions {
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .actions[hidden] {
            display: none !important;
        }

        .btn {
            appearance: none;
            border: 0;
            border-radius: 12px;
            padding: 11px 16px;
            font-size: 14px;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            color: #ffffff;
            background: linear-gradient(145deg, #7c7afc, #5b52ee);
            box-shadow: 0 14px 28px rgba(91, 82, 238, 0.4);
        }

        @media (max-width: 900px) {
            .scene { height: 250px; }
            .node { width: 102px; }
            .node.gift { left: 16px; }
            .node.server { right: 16px; }
            .node-icon { width: 72px; height: 72px; }
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .launcher-main { padding: 20px 14px 20px; }
            .scene { height: 280px; }
            .node.gift { left: 18px; }
            .node.server { right: 18px; }
        }
    </style>
</head>
<body>
    <div class="launcher">
        <header class="launcher-head">

                        <circle cx="18" cy="19" r="1.8" fill="#22c55e"/>

                        <rect x="24" y="17.5" width="22" height="2" rx="1" fill="#334155"/>
                        <rect x="24" y="30.5" width="22" height="2" rx="1" fill="#334155"/>
                        <rect x="24" y="43.5" width="22" height="2" rx="1" fill="#334155"/>

            </section>

            <div class="progress-wrap">
                <div class="progress-meta">
                    <span class="progress-status" id="statusText">Prêt</span>
                    <span class="progress-percent" id="progressText">0%</span>
                </div>
                <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <p id="message" class="message"></p>
            <div class="actions" id="retryWrap" hidden>
                <button type="button" class="btn btn-primary" id="retryBtn" data-i18n="retry_btn">Réessayer</button>
            </div>
        </main>
    </div>

    <script>
        (function () {

                    subtitle: "Vorbereitung der FlatCMS-Extraktion und automatischer Start des Installers.",
                    gift_label: "Paket",

                    msg_starting: "Avvio estrazione...",

                    msg_unknown: "Errore sconosciuto.",
                    msg_parse: "Risposta server non valida.",
                    msg_interrupt: "Estrazione interrotta.",
                    msg_csrf: "Token di sicurezza non valido."
                },
                pt: {
                    heading: "Loading installer system",
                    subtitle: "Preparando extração do pacote FlatCMS e iniciando o instalador automaticamente.",
                    gift_label: "Pacote",
                    server_label: "Servidor",
                    retry_btn: "Tentar novamente",
                    status_ready: "Pronto para extrair",
                    status_prep: "Preparando...",
                    status_running: "Extração em andamento...",
                    status_done: "Extração concluída",
                    status_error: "Erro",
                    msg_starting: "Iniciando extração...",
                    msg_done: "Extração concluída. Redirecionando para o instalador...",
                    msg_unknown: "Erro desconhecido.",
                    msg_parse: "Resposta do servidor inválida.",
                    msg_interrupt: "Extração interrompida.",
                    msg_csrf: "Token de segurança inválido."
                }
            };

            const sceneEl = document.getElementById("scene");
            const progressFill = document.getElementById("progressFill");
            const progressText = document.getElementById("progressText");
            const statusText = document.getElementById("statusText");
            const messageEl = document.getElementById("message");
            const progressBar = document.querySelector(".progress-track");
            const folderLane = sceneEl ? sceneEl.querySelector(".folder-lane") : null;
            const retryWrap = document.getElementById("retryWrap");
            const retryBtn = document.getElementById("retryBtn");
            const MIN_EXTRACT_VISUAL_DURATION_MS = 10000;
            const POST_COMPLETE_DELAY_MS = 5000;
            const PREP_PROGRESS_CAP = 10;
            const EXTRACT_PROGRESS_SPAN = 90;

            const state = {
                lang: resolveLang(),
                started: false,
                targetProgress: 0,
                displayedProgress: 0,
                rafId: 0,
                token: "",
                nextHref: "",
                extractionDone: false,
                completionAnnounced: false,
                completionAtTs: 0,
                launchTs: performance.now()
            };
            let folderEmitterTimer = 0;
            const activeFolders = [];
            let folderAnimationRaf = 0;

            const folderSvg = `
<svg viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M8 20C8 17.8 9.8 16 12 16H27.5L32 10H52C54.2 10 56 11.8 56 14V16H12C9.8 16 8 17.8 8 20Z" fill="#fcd34d"/>
  <rect x="8" y="16" width="48" height="30" rx="6" fill="url(#folderBody)"/>
  <rect x="8" y="16" width="48" height="10" rx="6" fill="url(#folderTop)" fill-opacity=".8"/>
  <path d="M44 22H51V29H44V22Z" fill="url(#docPaper)"/>
  <path d="M49 22L51 24H49V22Z" fill="#cbd5e1"/>
  <defs>
    <linearGradient id="folderBody" x1="8" y1="16" x2="56" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="folderTop" x1="8" y1="16" x2="56" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="docPaper" x1="44" y1="22" x2="51" y2="29" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
</svg>`;

            function getFolderPath() {
                if (!sceneEl) {
                    return null;
                }

                const giftIcon = sceneEl.querySelector(".node.gift .node-icon");
                const serverIcon = sceneEl.querySelector(".node.server .node-icon");
                if (!(giftIcon instanceof Element) || !(serverIcon instanceof Element)) {
                    return null;
                }

                const sceneRect = sceneEl.getBoundingClientRect();
                const giftRect = giftIcon.getBoundingClientRect();
                const serverRect = serverIcon.getBoundingClientRect();

                const sx = (giftRect.left - sceneRect.left) + (giftRect.width / 2);
                const sy = (giftRect.top - sceneRect.top) + (giftRect.height / 2);
                const ex = (serverRect.left - sceneRect.left) + (serverRect.width / 2);
                const ey = (serverRect.top - sceneRect.top) + (serverRect.height / 2);
                const cx = (sx + ex) / 2;
                const lift = clamp(sceneRect.height * 0.42, 86, 156);
                const cy = Math.min(sy, ey) - lift;

                return { sx, sy, cx, cy, ex, ey };
            }

            function quadraticBezier(p0, p1, p2, t) {
                const oneMinusT = 1 - t;
                return (oneMinusT * oneMinusT * p0) + (2 * oneMinusT * t * p1) + (t * t * p2);
            }

            function quadraticDerivative(p0, p1, p2, t) {
                return (2 * (1 - t) * (p1 - p0)) + (2 * t * (p2 - p1));
            }

            function ensureFolderLoop() {
                if (folderAnimationRaf) {
                    return;
                }

                const tick = (now) => {
                    for (let i = activeFolders.length - 1; i >= 0; i--) {
                        const item = activeFolders[i];
                        const rawT = (now - item.startAt) / item.duration;
                        const t = clamp(rawT, 0, 1);
                        const x = quadraticBezier(item.sx, item.cx, item.ex, t);
                        const y = quadraticBezier(item.sy, item.cy, item.ey, t);
                        const dx = quadraticDerivative(item.sx, item.cx, item.ex, t);
                        const dy = quadraticDerivative(item.sy, item.cy, item.ey, t);
                        const angle = Math.atan2(dy, dx) * (180 / Math.PI);
                        const scale = 0.42 + (Math.sin(Math.PI * t) * 0.58);

                        let opacity = 1;
                        if (t < 0.12) {
                            opacity = t / 0.12;
                        } else if (t > 0.88) {
                            opacity = (1 - t) / 0.12;
                        }
                        opacity = clamp(opacity, 0, 1);

                        const el = item.el;
                        el.style.opacity = String(opacity);
                        el.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%) scale(${scale}) rotate(${angle * 0.3}deg)`;

                        if (rawT >= 1) {
                            el.remove();
                            activeFolders.splice(i, 1);
                        }
                    }

                    if (activeFolders.length > 0) {
                        folderAnimationRaf = requestAnimationFrame(tick);
                    } else {
                        folderAnimationRaf = 0;
                    }
                };

                folderAnimationRaf = requestAnimationFrame(tick);
            }

            function resolveLang() {
                const params = new URLSearchParams(window.location.search);
                const urlLang = normalizeLang(params.get("lang"));
                if (urlLang) {
                    return urlLang;
                }

                const saved = normalizeLang(window.localStorage.getItem("flatcms_installer_lang"));
                if (saved) {
                    return saved;
                }

                const browser = normalizeLang((navigator.language || "fr").slice(0, 2));
                return browser || "fr";
            }

            function normalizeLang(value) {
                const lang = String(value || "").trim().toLowerCase().slice(0, 2);
                if (!lang || !DICT[lang]) {
                    return "";
                }
                return lang;
            }

            function t(key) {
                const dict = DICT[state.lang] || DICT.fr;
                return dict[key] || DICT.en[key] || key;
            }

            function applyLang() {
                document.documentElement.lang = state.lang;
                document.querySelectorAll("[data-i18n]").forEach((el) => {
                    const key = el.getAttribute("data-i18n");
                    if (!key) {
                        return;
                    }
                    el.textContent = t(key);
                });

                setStatus("status_ready");
                setMessage("", "");
            }

            function setStatus(key) {
                statusText.textContent = t(key);
            }

            function setMessage(kind, text) {
                messageEl.classList.remove("error", "success");
                if (kind) {
                    messageEl.classList.add(kind);
                }
                messageEl.textContent = text || "";
            }

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            function updateProgressVisual(value) {
                const safe = clamp(Math.round(value), 0, 100);
                progressFill.style.width = safe + "%";
                progressText.textContent = safe + "%";
                if (progressBar) {
                    progressBar.setAttribute("aria-valuenow", String(safe));
                }
            }

            function elapsedMs() {
                return Math.max(0, performance.now() - state.launchTs);
            }

            function timedProgressCap() {
                return clamp((elapsedMs() / MIN_EXTRACT_VISUAL_DURATION_MS) * 100, 0, 100);
            }

            function runProgressLoop() {
                cancelAnimationFrame(state.rafId);
                let lastTs = performance.now();

                const tick = (ts) => {
                    if (state.extractionDone) {
                        state.targetProgress = Math.max(state.targetProgress, timedProgressCap());
                    }

                    const dt = Math.max(16, ts - lastTs);
                    lastTs = ts;
                    const delta = state.targetProgress - state.displayedProgress;
                    const speed = delta > 0 ? 0.16 : 0.24;
                    state.displayedProgress += delta * speed * (dt / 16);

                    if (Math.abs(delta) < 0.08) {
                        state.displayedProgress = state.targetProgress;
                    }

                    updateProgressVisual(state.displayedProgress);

                    const readyForCompletion = state.extractionDone && elapsedMs() >= MIN_EXTRACT_VISUAL_DURATION_MS;
                    if (readyForCompletion && !state.completionAnnounced) {
                        state.targetProgress = 100;
                        state.displayedProgress = 100;
                        updateProgressVisual(100);
                        state.completionAnnounced = true;
                        state.completionAtTs = performance.now();
                        setStatus("status_done");
                        setMessage("success", t("msg_done"));
                    }

                    if (state.completionAnnounced) {
                        if (state.completionAtTs > 0 && (performance.now() - state.completionAtTs) >= POST_COMPLETE_DELAY_MS) {
                            window.location.href = state.nextHref || ("index.php?step=1&lang=" + encodeURIComponent(state.lang));
                            return;
                        }
                    }

                    state.rafId = requestAnimationFrame(tick);
                };

                state.rafId = requestAnimationFrame(tick);
            }

            function postForm(payload) {
                const form = new FormData();
                Object.keys(payload).forEach((key) => form.append(key, payload[key]));
                return fetch("unpack.php", {
                    method: "POST",
                    body: form,
                    credentials: "same-origin",
                    headers: {
                        "X-Requested-With": "XMLHttpRequest"
                    }
                });
            }

            function parseJson(response) {
                if (!response.ok) {
                    throw new Error(t("msg_unknown"));
                }
                return response.json().catch(() => {
                    throw new Error(t("msg_parse"));
                });
            }

            async function runPreparationPhase() {
                setStatus("status_prep");
                setMessage("", t("msg_starting"));
                const startTs = performance.now();
                const prepDuration = 1800;

                await new Promise((resolve) => {
                    const prepTick = (ts) => {
                        const elapsed = ts - startTs;
                        const ratio = clamp(elapsed / prepDuration, 0, 1);
                        const extractionProgress = PREP_PROGRESS_CAP * ratio;
                        state.targetProgress = Math.min(extractionProgress, timedProgressCap());
                        if (ratio >= 1) {
                            resolve();
                            return;
                        }
                        requestAnimationFrame(prepTick);
                    };
                    requestAnimationFrame(prepTick);
                });
            }

            function createFlyingFolder() {
                if (!(folderLane instanceof HTMLElement)) {
                    return;
                }

                const path = getFolderPath();
                if (!path) {
                    return;
                }

                const folder = document.createElement("span");
                folder.className = "flying-folder";
                folder.innerHTML = folderSvg;

                folderLane.appendChild(folder);
                activeFolders.push({
                    el: folder,
                    startAt: performance.now(),
                    duration: 1950,
                    sx: path.sx,
                    sy: path.sy,
                    cx: path.cx,
                    cy: path.cy,
                    ex: path.ex,
                    ey: path.ey
                });
                ensureFolderLoop();
            }

            function startFolderEmitter() {
                stopFolderEmitter();
                createFlyingFolder();
                folderEmitterTimer = window.setInterval(() => {
                    if (state.started) {
                        createFlyingFolder();
                    }
                }, 700);
            }

            function stopFolderEmitter() {
                if (folderEmitterTimer) {
                    window.clearInterval(folderEmitterTimer);
                    folderEmitterTimer = 0;
                }
                activeFolders.splice(0, activeFolders.length).forEach((item) => {
                    item.el.remove();
                });
                if (folderAnimationRaf) {
                    cancelAnimationFrame(folderAnimationRaf);
                    folderAnimationRaf = 0;
                }
            }

            async function initExtraction() {
                const response = await postForm({
                    action: "init",
                    lang: state.lang
                });
                const data = await parseJson(response);

                if (!data || data.success !== true) {
                    throw new Error((data && data.message) || t("msg_unknown"));
                }

                if (!data.can_extract) {
                    throw new Error((data && data.message) || t("msg_unknown"));
                }

                state.token = String(data.token || "");
                state.nextHref = String(data.next || "");
                if (!state.token) {
                    throw new Error(t("msg_csrf"));
                }
            }

            async function extractBatch(start) {
                const response = await postForm({
                    action: "extract_batch",
                    token: state.token,
                    lang: state.lang,
                    start: String(start)
                });
                const data = await parseJson(response);

                if (!data || data.success !== true) {
                    throw new Error((data && data.error) || t("msg_interrupt"));
                }

                setStatus("status_running");
                const stepProgress = clamp(Number(data.progress || 0), 0, 100);
                const extractionProgress = PREP_PROGRESS_CAP + (stepProgress * (EXTRACT_PROGRESS_SPAN / 100));
                state.targetProgress = Math.min(extractionProgress, timedProgressCap());

                if (data.done) {
                    state.nextHref = String(data.next || state.nextHref || "");
                    state.targetProgress = Math.max(state.targetProgress, timedProgressCap());
                    state.extractionDone = true;
                    return;
                }

                const nextStart = Number(data.next_start || 0);
                await extractBatch(nextStart);
            }

            function showRetry() {
                retryWrap.hidden = false;
            }

            async function runExtractionFlow() {
                if (state.started) {
                    return;
                }

                state.started = true;
                state.extractionDone = false;
                state.completionAnnounced = false;
                state.completionAtTs = 0;
                retryWrap.hidden = true;
                startFolderEmitter();

                try {
                    await runPreparationPhase();
                    await initExtraction();
                    await extractBatch(0);
                } catch (error) {
                    state.started = false;
                    stopFolderEmitter();
                    setStatus("status_error");
                    setMessage("error", error instanceof Error ? error.message : t("msg_unknown"));
                    showRetry();
                }
            }

            retryBtn.addEventListener("click", () => {
                runExtractionFlow();
            });

            window.localStorage.setItem("flatcms_installer_lang", state.lang);
            applyLang();
            runProgressLoop();
            setTimeout(() => runExtractionFlow(), 450);
        })();
    </script>
</body>
</html>
