# FlatCMS auto-generated Nginx template
# IMPORTANT: adapt fastcgi_pass to your PHP-FPM socket/host before enabling.
# This template is aligned with public docroot installs (docroot = project_root/public).

server {
    listen 80;
    server_name localhost;

    root "/path/to/flatcms/public";
    index index.php index.html;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'; object-src 'none'; script-src 'self' https://challenges.cloudflare.com https://static.axept.io https://cdn.tiny.cloud https://*.tiny.cloud; style-src 'self' 'unsafe-inline' https://cdn.tiny.cloud https://*.tiny.cloud; img-src 'self' data: blob: https:; font-src 'self' data: https://cdn.tiny.cloud https://*.tiny.cloud; connect-src 'self' blob: https://challenges.cloudflare.com https://static.axept.io https://*.axept.io https://cdn.tiny.cloud https://*.tiny.cloud; frame-src 'self' https://challenges.cloudflare.com https://static.axept.io https://*.axept.io https://www.google.com https://maps.google.com; media-src 'self' data: blob: https:; manifest-src 'self'; worker-src 'self' blob:" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Download-Options "noopen" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Example TCP (common):
        # fastcgi_pass 127.0.0.1:9000;
        # Example Unix socket:
        # fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_pass 127.0.0.1:9000;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* (^|/)\.(?!well-known/) {
        deny all;
    }

    location ~* \.\./ {
        return 400;
    }

    location ~* \.((bak|old|orig|save|swp|dist|example)|backup(\..*)?)$ {
        deny all;
    }

    location ~* (^|/)(web\.config|nginx\.conf|composer\.(json|lock)|\.env(\..*)?)$ {
        return 404;
    }

    location ~* ^/(data|storage|config)/ {
        deny all;
    }

    location ~* ^/(app|resources|vendor)/ {
        deny all;
    }

    # Optional hardening once installation is complete:
    # location ^~ /install/ {
    #     return 403;
    # }
}
